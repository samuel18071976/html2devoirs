<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fòmulè</title>
</head>
<body>
    
</body>
<footer>
    <p><b><u>Fòmulè</u></b></p>
<form>
    <label for="nom">*Non:</label>
    <input type="text" required name="nom"  placeholder="Ekri siyati w "> <br><br>
    
    <label for="nom">*Prenon:</label>
    <input type="text" required name="nom" placeholder="Pati sa pou ekri non w"> <br><br>

    <textarea cols="30" rows="10 placeholder="Ekri kòmantè pa w la a"></textarea> <br><br>

    <label for="email">*Ekri E-mail ou a</label>
    <input type="email"required><br><br>

    <label for="password">*Mete modpas ou</label>
    <input type="password" required><br><br>

    <label for="date">Mete dat</label>
    <input type="datetime-local"><br><br>
    <input type="date" min="0000-00-00" max="2026-04-26"><br><br>
    <input type="date" min="2026-04-25" max="0000-00-00"><br><br>

    <label for="week">Semèn</label>
    <input type="week"><br><br>

    <label for="tel">Telefòn</label>
    <input type="tel"><br><br>

    <label for="number">Nimero</label>
    <input type="number"><br><br>

    <label for="file">Fichye</label>
    <input type="file"><br><br>

    <label for="image">Foto</label>
    <input type="image"><br><br>

    <label for="url">Sit entènèt</label>
    <input type="url"><br><br>

    <label for="range">Satisfaksyon</label>
    <input type="range" min="0" max="100" value="80"><br><br>

    <label for="reset">Efase</label>
    <input type="reset" value="si w'ap efase klike la"><br><br>

    <label for="search">Rechèch</label>
    <input type="search"><br><br>

    <label for="color">Koulè</label>
    <input type="color">

    <p><b><u>Chwazi sèks ou:</u></b></p>
    <input type="radio" value="Fi" name="moun">Fi<br>
    <input type="radio" value="Gason" name="moun">Gason<br><br>

    <p><b><u>Chwazi lang ou pale:</u></b></p>
    <label><input type="checkbox" name="lang" value="kreyòl" checked>Kreyòl<br></label>
    <label><input type="checkbox" name="lang" value="franse">Franse <br></label>
    <label><input type="checkbox" name="lang" value="anglè">Anglè <br></label>
    <br><br>

    <p><b><u>Chwazi peyi w la:</u></b></p>
    <label for="pays">chwazi peyi a</label>
    <select name="pays" id="peyi">
        <option value="pays">Chwazi peyi w la:</option>
        <option value="Ayiti">Ayiti</option>
        <option value="Bresil">Bresil</option>
        <option value="USA">Etazini</option>
    </select><br><br><br>

    <p><b><u>Chwazi veyikil ou vle a:</u></b></p>
    <label for="vehicule">Chwazi sa w vle a:</label>
    <select name="vehicule">
        <optgroup label="machine">
            <option value="toyota">Toyota</option>
            <option value="bmw">Bmw</option>
            <option value="mazda">Mazda</option>
        </optgroup>
        <optgroup label="moto">
            <option value="kawazaki">Kawasaki</option>
            <option value="honda">Honda</option>
            <option value="zusuki">Zusuki</option>
        </optgroup>
    </select><br><br><br>

    <iframe src="https://www.google.com/maps/embed?pb=!1m12!1m8!1m3!1d60519.10902169018!2d-72.3212814!3d18.553997!3m2!1i1024!2i768!4f13.1!2m1!1smagasin%20vente%20voiture%20moto%20Haiti!5e0!3m2!1sen!2sht!4v1777131838807!5m2!1sen!2sht" width="200" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"><br><br><br>

    <input type="submit" value="Voye ale">
</form>

</footer>
</html>
